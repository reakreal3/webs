<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korblox Account Sale</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px 0; background: #000; color: #fff; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 320px; padding: 24px; border: 1px solid #222; border-radius: 24px; background: #050505; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .label-top { font-size: 8px; text-transform: uppercase; opacity: 0.5; font-weight: 900; letter-spacing: 2px; margin-bottom: 4px; }
        h1 { margin: 0 0 20px 0; font-style: italic; font-weight: 900; text-transform: uppercase; font-size: 24px; color: #fff; text-shadow: 0 0 10px #00FFC270; }
        .video-container { position: relative; width: 100%; aspect-ratio: 4/5; background: #111; border: 1px solid #333; border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .section-label { font-size: 7px; text-transform: uppercase; opacity: 0.4; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .box { background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box-label { font-size: 6px; text-transform: uppercase; opacity: 0.3; font-weight: 700; margin-bottom: 4px; }
        .box-value { font-weight: 900; font-size: 10px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 12px; align-items: stretch; }
        .offer-box { background: #111; border: 1px solid #222; padding: 12px; border-radius: 12px; text-align: left; }
        .offer-price { color: #00FFC2; font-weight: 900; font-size: 14px; margin-top: 2px; }
        .discord-box { background: #fff; color: #000; padding: 12px; border-radius: 12px; text-align: left; display: flex; flex-direction: column; justify-content: center; }
        .discord-label { font-size: 6px; font-weight: 900; text-transform: uppercase; opacity: 0.5; margin-bottom: 2px; }
        .discord-handle { font-weight: 900; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label-top">✨ Limited Listing ✨</div>
        <h1>KORBLOX ACCOUNT FOR SALE</h1>
        
        <div class="video-container">
            <video src="https://files.catbox.moe/6zw459.mp4#t=3" controls playsinline loop></video>
        </div>

        <div class="section-label">Account Info</div>
        <div class="grid">
            <div class="box">
                <div class="box-label">User</div>
                <div class="box-value">nookuwu</div>
            </div>
            <div class="box">
                <div class="box-label">Password</div>
                <div class="box-value">2515252784</div>
            </div>
        </div>

        <div class="footer-grid">
            <div class="offer-box">
                <div class="box-label" style="text-align: left;">Offer</div>
                <div class="offer-price">2K - 3K ROBUX</div>
            </div>
            <div class="discord-box">
                <div class="discord-label">Contact me at discord</div>
                <div class="discord-handle">@w38r</div>
            </div>
        </div>
    </div>
</body>
</html>
