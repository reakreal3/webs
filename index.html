  <!-- TRENDING SECTION -->

  <!-- VIDEO MODAL - Now supports iframe for external videos -->
  <div id="videoModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">

  <footer class="bg-black py-12 text-center text-zinc-500 text-xs">

  <script>
    const videos = [
      { id: 0, title: "Hot Summer Vibes", duration: "12:45", views: "2.3M", img: "https://picsum.photos/id/1015/320/180", verified: true, desc: "Steamy beach day turns intense", category: "trending", externalLink: null },
      { id: 1, title: "Intense Workout Session", duration: "8:22", views: "1.8M", img: "https://picsum.photos/id/201/320/180", verified: true, desc: "Sweaty bodies and heavy breathing", category: "mostviewed", externalLink: null },
      { id: 2, title: "Late Night Tease", duration: "15:10", views: "4.1M", img: "https://picsum.photos/id/237/320/180", verified: false, desc: "Slow sensual movements", category: "new", externalLink: null },
      { id: 3, title: "Passionate Oil Massage", duration: "10:55", views: "3.7M", img: "https://picsum.photos/id/133/320/180", verified: true, desc: "Hands exploring every curve", category: "trending", externalLink: null },
      { id: 4, title: "Sensual Shower Scene", duration: "22:30", views: "5.2M", img: "https://picsum.photos/id/180/320/180", verified: true, desc: "Water and desire", category: "mostviewed", externalLink: null },
      { id: 5, title: "Wild Weekend Getaway", duration: "7:48", views: "1.1M", img: "https://picsum.photos/id/251/320/180", verified: false, desc: "No rules, pure passion", category: "new", externalLink: null },
      { id: 6, title: "VR Close-Up Experience", duration: "18:20", views: "980K", img: "https://picsum.photos/id/870/320/180", verified: true, desc: "Immersive 360 pleasure", category: "vr", externalLink: null },
      { id: 7, title: "Slow & Sensual Touch", duration: "14:15", views: "2.9M", img: "https://picsum.photos/id/1016/320/180", verified: true, desc: "Intimate connection", category: "trending", externalLink: null },
      { id: 8, title: "Midnight Desire", duration: "9:50", views: "1.4M", img: "https://picsum.photos/id/133/320/180", verified: false, desc: "Dark room, burning passion", category: "new", externalLink: null },
      { 
        id: 9, 
        title: "My Homeboy Mom Sucking My Dick", 
        duration: "1:04", 
        views: "2.1M", 
        img: "https://picsum.photos/id/1015/320/180", 
        verified: false, 
        desc: "Intense homemade moment", 
        category: "trending", 
        externalLink: "https://www.xvideos.com/video.ktdlptd98f7/my_homeboy_mom_sucking_my_dick" 
      }
    ];

    let currentFilter = 'all';
    let displayedVideos = [...videos];

    function createVideoCard(video) {
      return `
        <div onclick="handleCardClick(${video.id})" class="video-card cursor-pointer group">
          <div class="thumbnail-container bg-black">
            <img src="${video.img}" alt="${video.title}" class="w-full aspect-video object-cover">
            <div class="duration">${video.duration}</div>
            ${video.verified ? `<div class="verified">✓</div>` : ''}
          </div>
          <div class="mt-4 px-1">
            <h3 class="font-medium text-base leading-tight line-clamp-2 group-hover:text-red-500">${video.title}</h3>
            <div class="text-xs text-zinc-400 mt-2">${video.views} views • Today</div>
          </div>
        </div>
      `;
    }

    function renderVideos(containerId, videoList) {
      document.getElementById(containerId).innerHTML = videoList.map(v => createVideoCard(v)).join('');
    }

    function handleCardClick(id) {
      const video = videos.find(v => v.id === id);
      if (!video) return;

      document.getElementById('modalTitle').textContent = video.title;
      document.getElementById('modalDesc').innerHTML = `
        <div class="flex gap-4 text-sm">
          <span>${video.views} views</span>
          <span>•</span>
          <span>${video.duration}</span>
        </div>
        <p class="mt-3">${video.desc}</p>
      `;

      const modalContent = document.getElementById('modalContent');
      modalContent.innerHTML = '';

      if (video.externalLink) {
        // Embed XVideos page via iframe so the video can play
        modalContent.innerHTML = `
          <iframe src="${video.externalLink}" 
                  allowfullscreen 
                  allow="autoplay; encrypted-media"
                  style="width:100%; height:100%; min-height:500px;"></iframe>
        `;
      } else {
        // Demo card fallback
        modalContent.innerHTML = `
          <div class="flex items-center justify-center h-full text-zinc-400">
            <div class="text-center">
              <i class="fa-solid fa-video text-6xl mb-4"></i>
              <p>Demo video would play here</p>
            </div>
          </div>
        `;
      }

      const modal = document.getElementById('videoModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('videoModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      // Clear iframe to stop playback
      document.getElementById('modalContent').innerHTML = '';
    }

    function filterVideos(filter) { /* same as previous version */ 
      currentFilter = filter;
      if (filter === 'all' || filter === 'trending') {
        displayedVideos = videos.filter(v => ['trending', 'mostviewed', 'new'].includes(v.category));
      } else {
        displayedVideos = videos.filter(v => v.category === filter);
      }
      renderVideos('video-grid', displayedVideos);

      const titles = { 'all': 'Trending Right Now 🔥', 'trending': 'Trending Right Now 🔥', 'mostviewed': 'Most Viewed Videos', 'new': 'New Videos', 'vr': 'VR Porn' };
      document.getElementById('sectionTitle').textContent = titles[filter] || 'Trending Right Now 🔥';
    }

    function showMore() {
      alert("In a full site this would load more videos.");
    }

    // Search, nav, and initial render (same as before)
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      if (!term) {
        renderVideos('video-grid', displayedVideos);
        return;
      }
      const filtered = displayedVideos.filter(v => 
        v.title.toLowerCase().includes(term) || v.desc.toLowerCase().includes(term)
      );
      renderVideos('video-grid', filtered);
    });

    document.querySelectorAll('#secondaryNav a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('#secondaryNav a').forEach(l => l.classList.remove('active-nav'));
        link.classList.add('active-nav');
        filterVideos(link.getAttribute('data-filter'));
      });
    });

    document.addEventListener('keydown', e => { if (e.key === "Escape") closeModal(); });

    // Initial render
    renderVideos('video-grid', videos);
    renderVideos('recommended-grid', videos.slice(1).concat(videos.slice(0, 3)));
  </script>
</body>
